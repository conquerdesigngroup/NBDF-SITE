<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
</head>
<body>
<pre id="out" style="font-size:11px;white-space:pre-wrap;max-width:900px"></pre>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

async function extractText(url) {
  const pdf = await pdfjsLib.getDocument(url).promise;
  let fullText = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    fullText += `\n--- PAGE ${i} ---\n` + pageText + '\n';
  }
  return fullText;
}

(async () => {
  const out = document.getElementById('out');
  out.textContent = 'Loading...';
  try {
    const t1 = await extractText('uploads/Dancer sponsorship letter-ba095d7e.pdf');
    const t2 = await extractText('uploads/Show sponsorship letter-b69b88f3.pdf');
    out.textContent = '=== DANCER LETTER ===\n' + t1 + '\n\n=== SHOW LETTER ===\n' + t2;
  } catch(e) {
    out.textContent = 'Error: ' + e.message;
  }
})();
</script>
</body>
</html>
